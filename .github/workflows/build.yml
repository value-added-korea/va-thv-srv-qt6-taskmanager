name: Build Packages

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debhelper devscripts dpkg-dev

      - name: Build Debian packages
        run: make deb

      - name: Upload .deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deb-packages
          path: dist/*.deb

  build-rpm:
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: dnf install -y rpm-build make

      - name: Build RPM packages
        run: make rpm

      - name: Upload RPM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rpm-packages
          path: dist/*.rpm

  build-arch:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: pacman -Sy --noconfirm base-devel sudo

      - name: Build Arch package
        run: |
          useradd -m builder
          chown -R builder:builder .
          su builder -c "make arch"

      - name: Upload Arch artifacts
        uses: actions/upload-artifact@v4
        with:
          name: arch-packages
          path: dist/*.pkg.tar.zst

  release:
    needs: [build-deb, build-rpm, build-arch]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
